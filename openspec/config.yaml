schema: spec-driven

context: |
  Tech stack: Next.js 16 (App Router), React 19, Tailwind CSS v4, shadcn/ui (base-nova style, @base-ui/react), Recharts, Zustand, Prisma
  Architecture: Server-first App Router with client components where interactivity needed
  Testing: Vitest + Testing Library
  Style: shadcn/ui base-nova, lucide-react icons, Tailwind CSS v4

rules:
  proposal:
    - Include rollback plan for risky changes
    - Stay under 450 words
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Respect 400-line PR budget per stacked PR
  apply:
    - Follow existing shadcn/ui base-nova patterns
    - Use @base-ui/react primitives (NOT radix-ui) for new components
    - Maintain Tailwind CSS v4 compatibility
    tdd: false
    test_command: "vitest"
  verify:
    test_command: "vitest run"
    build_command: "next build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
